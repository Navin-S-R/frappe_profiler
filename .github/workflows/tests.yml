name: Tests

# Run on every push to any branch + every pull request. Manual dispatch
# is allowed for re-running a flake or testing the workflow itself.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

# Cancel any in-flight run for the same branch/PR when a new commit lands —
# saves CI minutes on rapid-push branches.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Keep going on a single Python-version failure so we see the full
      # picture across versions in one run instead of cancelling siblings.
      fail-fast: false
      matrix:
        # 3.12: the broad-compat baseline most production benches run.
        # 3.14: matches the dev bench's interpreter (Python 3.14.2 locally).
        python-version: ['3.12', '3.14']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install build prerequisites
        # ``line_profiler`` ships a C extension. Pre-built wheels exist for
        # most 3.12 / 3.14 cpython targets, but if pip falls back to a
        # source build we want the headers/toolchain ready so the failure
        # mode is "slow" not "broken".
        run: |
          python -m pip install --upgrade pip wheel setuptools

      - name: Install runtime + test dependencies
        # ``-e .`` installs the project's runtime deps declared in
        # pyproject.toml (pyinstrument / line_profiler / requests). The
        # second line adds pytest + the small set of test-only deps the
        # suite imports (hypothesis-based property tests in the analyzer
        # set, pdfplumber for the one Lens-audit PDF parsing test).
        # Frappe itself is intentionally NOT installed — the suite is
        # pure-Python and the conftest fence keeps frappe-stub mutations
        # contained per-test.
        run: |
          python -m pip install -e .
          python -m pip install pytest hypothesis Faker pdfplumber pypdf

      - name: Run pytest
        run: |
          python -m pytest frappe_profiler/tests/ -v --tb=short

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        # Pinned major; ruff's CLI surface is stable within a major version
        # and the config in pyproject.toml is already authored against this
        # series.
        run: python -m pip install 'ruff>=0.6,<1'

      - name: Lint (uses pyproject.toml [tool.ruff] config)
        run: ruff check frappe_profiler/

      - name: Format check
        # Non-fatal advisory step — surfaces format drift without blocking
        # the run while the team chooses whether to enforce. Drop the
        # ``continue-on-error`` line below to make it a hard gate.
        run: ruff format --check frappe_profiler/
        continue-on-error: true
